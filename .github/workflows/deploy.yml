name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Never let two Pages deployments race; let an in-flight deploy finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # withastro/action auto-detects bun from bun.lock, then installs,
      # builds, and uploads the dist/ folder as the Pages artifact.
      - name: Build and upload
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
